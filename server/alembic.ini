[alembic]
# %(here)s resolves to the directory of THIS ini file, so migrations are found
# from both: repo-root (`alembic -c server/alembic.ini ...`) and Docker (CWD=/app).
script_location = %(here)s/migrations
sqlalchemy.url = postgresql://epicase:epicase@localhost:5432/epicase
prepend_sys_path = %(here)s

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
